<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrera de Países - Live</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  width: 900px;
  padding: 20px;
  overflow: hidden;
}
.track {
  position: relative;
  height: 80px;
  margin-bottom: 20px;
  background: #222;
  border-radius: 12px;
  overflow: hidden;
}
.finish-line {
  position: absolute;
  right: 0;
  top: 0;
  width: 10px;
  height: 100%;
  background: #ffcc00;
}
.car {
  position: absolute;
  top: 10px;
  left: 0;
  height: 60px;
  display: flex;
  align-items: center;
  transition: left 0.1s linear;
}
.car img {
  height: 40px;
  margin-right: 10px;
}
.fruit {
  position: absolute;
  height: 24px;
  width: 24px;
  pointer-events: none;
  animation: floatUp 1s linear forwards;
}
@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-30px); opacity: 0; }
}
#winner {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  color: #ffcc00;
  font-size: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  display: none;
  flex-direction: column;
}
#winner img {
  height: 100px;
  margin-top: 20px;
}
</style>
</head>
<body>

<h2>🏁 Carrera de Países - ¡Gana tu país con regalos!</h2>

<div class="track" id="brazil-track">
  <div class="finish-line"></div>
  <div class="car" id="brazil-car">
    <img src="https://i.imgur.com/brasilCar.png" alt="Brasil">
    <img src="https://i.imgur.com/rosaEmoji.png" alt="Rosa">
  </div>
</div>

<div class="track" id="canada-track">
  <div class="finish-line"></div>
  <div class="car" id="canada-car">
    <img src="https://i.imgur.com/canadaCar.png" alt="Canadá">
    <img src="https://i.imgur.com/tiktokLogo.png" alt="TikTok">
  </div>
</div>

<div class="track" id="spain-track">
  <div class="finish-line"></div>
  <div class="car" id="spain-car">
    <img src="https://i.imgur.com/spainCar.png" alt="España">
    <img src="https://i.imgur.com/heartFire.png" alt="Corazón">
  </div>
</div>

<div class="track" id="usa-track">
  <div class="finish-line"></div>
  <div class="car" id="usa-car">
    <img src="https://i.imgur.com/usaCar.png" alt="EEUU">
    <img src="https://i.imgur.com/iceCream.png" alt="Helado">
  </div>
</div>

<div id="winner">
  <div id="winner-text"></div>
  <img id="winner-logo" src="">
</div>

<script>
// Configuración de carros
const cars = {
  "Brasil": {el: document.getElementById("brazil-car"), pos: 0, baseSpeed: 0.5, boost: 0, track: document.getElementById("brazil-track"), icon: "https://i.imgur.com/strawberry.png"},
  "Canadá": {el: document.getElementById("canada-car"), pos: 0, baseSpeed: 0.5, boost: 0, track: document.getElementById("canada-track"), icon: "https://i.imgur.com/apple.png"},
  "España": {el: document.getElementById("spain-car"), pos: 0, baseSpeed: 0.5, boost: 0, track: document.getElementById("spain-track"), icon: "https://i.imgur.com/banana.png"},
  "EEUU": {el: document.getElementById("usa-car"), pos: 0, baseSpeed: 0.5, boost: 0, track: document.getElementById("usa-track"), icon: "https://i.imgur.com/cherry.png"}
};

const finishLine = 700;

// Mostrar frutas/regalos
function showFruit(track, icon) {
  const fruit = document.createElement("img");
  fruit.src = icon;
  fruit.className = "fruit";
  fruit.style.left = Math.random()*50 + "px";
  track.appendChild(fruit);
  setTimeout(()=>track.removeChild(fruit),1000);
}

// Boost por regalo
function addBoost(country, amount) {
  const car = cars[country];
  car.boost += amount;
  showFruit(car.track, car.icon);
}

// Movimiento continuo
function raceLoop() {
  for (let c in cars) {
    const car = cars[c];
    car.pos += car.baseSpeed + car.boost;
    if(car.pos > finishLine) car.pos = finishLine;
    car.el.style.left = car.pos + "px";
    if(car.boost > 0) car.boost -= 0.02; // decay del boost
    if(car.pos >= finishLine) {
      showWinner(c);
      return;
    }
  }
  requestAnimationFrame(raceLoop);
}

// Mostrar ganador
function showWinner(country) {
  const winnerDiv = document.getElementById("winner");
  const text = document.getElementById("winner-text");
  const logo = document.getElementById("winner-logo");
  winnerDiv.style.display = "flex";
  text.textContent = `${country} GANÓ 🏆`;
  logo.src = cars[country].icon;
  setTimeout(resetRace,3000);
}

// Reiniciar carrera
function resetRace() {
  for(let c in cars) {
    cars[c].pos = 0;
    cars[c].boost = 0;
    cars[c].el.style.left = "0px";
  }
  document.getElementById("winner").style.display = "none";
  raceLoop();
}

// Teclas para simular regalos/interacciones
document.addEventListener("keydown", e=>{
  switch(e.key){
    case "q": addBoost("Brasil", 0.5); break;
    case "w": addBoost("Canadá", 1); break;
    case "e": addBoost("España", 1.5); break;
    case "r": addBoost("EEUU", 2); break;
  }
});

// Iniciar carrera
raceLoop();
</script>

</body>
</html>
