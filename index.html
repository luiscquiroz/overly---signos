<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrera de Países - Overlay Minimalista</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  overflow: hidden;
  width: 900px;
  padding: 20px;
}

.track-container {
  position: relative;
  width: 100%;
  height: 80px;
  overflow: hidden;
  margin-bottom: 20px;
  border-radius: 12px;
  background: #000;
}

.track {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  width: 200%;
  /* pista negra con rayas blancas */
  background: repeating-linear-gradient(
    to right,
    #fff 0px,
    #fff 20px,
    #000 20px,
    #000 40px
  );
}

.car {
  position: absolute;
  left: 50px;
  top: 10px;
  height: 60px;
  display: flex;
  align-items: center;
  transition: left 0.1s linear;
  z-index: 10;
}

.car img {
  height: 40px;
  margin-right: 10px;
}

.fruit {
  position: absolute;
  height: 24px;
  width: 24px;
  pointer-events: none;
  animation: moveFruit 2s linear forwards;
  z-index: 5;
}

@keyframes moveFruit {
  0% { transform: translateX(0); opacity: 1; }
  100% { transform: translateX(-900px); opacity: 0; }
}

#winner {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  color: #ffcc00;
  font-size: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  display: none;
  flex-direction: column;
}

#winner img { height: 100px; margin-top: 20px; }
</style>
</head>
<body>

<h2>🏁 Carrera de Países - Overlay Minimalista</h2>

<div class="track-container" id="brazil-track-container">
  <div class="track" id="brazil-track"></div>
  <div class="car" id="brazil-car">
    <img src="https://i.imgur.com/brasilCar.png" alt="Brasil">
    <img src="https://i.imgur.com/rosaEmoji.png" alt="Rosa">
  </div>
</div>

<div class="track-container" id="canada-track-container">
  <div class="track" id="canada-track"></div>
  <div class="car" id="canada-car">
    <img src="https://i.imgur.com/canadaCar.png" alt="Canadá">
    <img src="https://i.imgur.com/tiktokLogo.png" alt="TikTok">
  </div>
</div>

<div class="track-container" id="spain-track-container">
  <div class="track" id="spain-track"></div>
  <div class="car" id="spain-car">
    <img src="https://i.imgur.com/spainCar.png" alt="España">
    <img src="https://i.imgur.com/heartFire.png" alt="Corazón">
  </div>
</div>

<div class="track-container" id="usa-track-container">
  <div class="track" id="usa-track"></div>
  <div class="car" id="usa-car">
    <img src="https://i.imgur.com/usaCar.png" alt="EEUU">
    <img src="https://i.imgur.com/iceCream.png" alt="Helado">
  </div>
</div>

<div id="winner">
  <div id="winner-text"></div>
  <img id="winner-logo" src="">
</div>

<script>
// Configuración de carros
const cars = {
  "Brasil": {el: document.getElementById("brazil-car"), pos: 50, container: document.getElementById("brazil-track-container"), icon: "https://i.imgur.com/strawberry.png"},
  "Canadá": {el: document.getElementById("canada-car"), pos: 50, container: document.getElementById("canada-track-container"), icon: "https://i.imgur.com/apple.png"},
  "España": {el: document.getElementById("spain-car"), pos: 50, container: document.getElementById("spain-track-container"), icon: "https://i.imgur.com/banana.png"},
  "EEUU": {el: document.getElementById("usa-car"), pos: 50, container: document.getElementById("usa-track-container"), icon: "https://i.imgur.com/cherry.png"}
};

const finishLine = 800; // pixeles

// Animación de la pista
let trackOffset = 0;
function moveTrack() {
  trackOffset -= 4; // velocidad de la pista
  for(let c in cars){
    const container = cars[c].container.querySelector('.track');
    container.style.transform = `translateX(${trackOffset}px)`;
  }
  requestAnimationFrame(moveTrack);
}

// Mostrar fruta/regalo que da boost
function spawnFruit(country) {
  const car = cars[country];
  const fruit = document.createElement("img");
  fruit.src = car.icon;
  fruit.className = "fruit";
  fruit.style.top = Math.random()*30 + "px";
  fruit.style.left = "800px";
  car.container.appendChild(fruit);

  car.pos += 20; // boost visual del carro
  car.el.style.left = car.pos + "px";

  setTimeout(()=>{car.container.removeChild(fruit)},2000);

  if(car.pos >= finishLine){
    showWinner(country);
  }
}

// Mostrar ganador
function showWinner(country) {
  const winnerDiv = document.getElementById("winner");
  const text = document.getElementById("winner-text");
  const logo = document.getElementById("winner-logo");
  winnerDiv.style.display = "flex";
  text.textContent = `${country} GANÓ 🏆`;
  logo.src = cars[country].icon;
  setTimeout(resetRace,3000);
}

// Reiniciar carrera
function resetRace(){
  for(let c in cars){
    cars[c].pos = 50;
    cars[c].el.style.left = "50px";
  }
  document.getElementById("winner").style.display = "none";
}

// Teclas para simular regalos/interacciones
document.addEventListener("keydown", e=>{
  switch(e.key){
    case "q": spawnFruit("Brasil"); break;
    case "w": spawnFruit("Canadá"); break;
    case "e": spawnFruit("España"); break;
    case "r": spawnFruit("EEUU"); break;
  }
});

moveTrack();
</script>

</body>
</html>
