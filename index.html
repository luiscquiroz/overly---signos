<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay Manual Live - Marcas</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  width: 600px;
  padding: 10px;
  overflow: hidden;
}
.sign {
  margin: 15px 0;
  display: flex;
  align-items: center;
  position: relative;
}
.label {
  font-size: 16px;
  margin-right: 10px;
  width: 120px;
  font-weight: bold;
}
.bar-container {
  flex: 1;
  background: #222;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  height: 28px;
}
.fill {
  height: 100%;
  width: 0px;
  background: linear-gradient(90deg, #ff00cc, #00ffee);
  transition: width 0.3s;
}
.controls {
  margin-left: 10px;
}
button {
  margin: 2px;
  padding: 4px 6px;
  font-size: 12px;
  cursor: pointer;
}
.leader {
  font-size: 18px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
}
#leader-logo {
  height: 24px;
  margin-left: 8px;
  vertical-align: middle;
}
/* Indicador flotante */
.floating {
  position: absolute;
  font-size: 14px;
  font-weight: bold;
  pointer-events: none;
  opacity: 1;
  transition: transform 1s ease-out, opacity 1s ease-out;
  color: #ffff00;   /* amarillo brillante */
  left: 50%;        /* centra horizontalmente */
}
</style>
</head>
<body>

<div class="leader" id="leader">
  <span id="leader-name"></span>
  <img id="leader-logo" src="" alt="">
</div>

<div id="bars"></div>

<div class="rules">
  <h3>-</h3>
  <ul>
    <li>💬 Comentario normal = +0.05 puntos</li>
    <li>🌸 Rosa = +2 puntos (comenta tu favorito)</li>
    <li>🎩 Sombrero = +6 puntos (comenta tu favorito)</li>
    <li>🌌 Galaxia = llena toda la barra (comenta tu favorito)</li>
    <li>🔫 Pistola = -2 puntos (comenta a quien)</li>
    <li>💰 Tap Tap = + 0.05 puntos</li>
  </ul>
</div>

<script>
// Equipos / marcas
const teams = ["Apple", "Samsung", "Xiaomi"];
let scores = {};
const container = document.getElementById("bars");
const leaderEl = document.getElementById("leader-name");
const leaderLogo = document.getElementById("leader-logo");

// Logos por marca (cambia URL por tus imágenes reales)
const logos = {
  "Apple": "https://i.imgur.com/appleLogo.png",
  "Samsung": "https://i.imgur.com/samsungLogo.png",
  "Xiaomi": "https://i.imgur.com/xiaomiLogo.png"
};

// Crear barras y controles
teams.forEach(team => {
  scores[team] = 8; // valor inicial
  const div = document.createElement("div");
  div.className = "sign";
  div.innerHTML = `
    <div class="label">${team}</div>
    <div class="bar-container">
      <div class="fill" id="bar-${team}"></div>
    </div>
    <div class="controls">
      <button onclick="changeScore('${team}', 2)">+2</button>
      <button onclick="changeScore('${team}', 0.05)">+0.05</button>
      <button onclick="changeScore('${team}', -0.05)">-0.05</button>
    </div>
  `;
  container.appendChild(div);
});

// Actualizar barras
function updateBars() {
  for (let team in scores) {
    const width = Math.max(0, scores[team]); 
    document.getElementById(`bar-${team}`).style.width = width + "px";
  }
}

// Mostrar líder
function updateLeader() {
  let max = -1, leader = "---";
  for (let t in scores) {
    if (scores[t] > max) {
      max = scores[t];
      leader = t;
    }
  }

  // Texto llamativo para incentivar
  leaderEl.textContent = `⚡ ${leader} lidera ⚡ ¡dona o tap tap para apoyarlo!`;

  // Logo al lado
  leaderLogo.src = logos[leader] || "";
}

// Indicador flotante
function showFloating(team, value) {
  const barContainer = document.querySelector(`#bar-${team}`).parentElement;
  const floatEl = document.createElement("div");
  floatEl.className = "floating";
  floatEl.textContent = (value > 0 ? "+" : "") + value;
  barContainer.appendChild(floatEl);

  setTimeout(() => {
    floatEl.style.transform = "translateX(-50%) translateY(-30px)";
    floatEl.style.opacity = "0";
  }, 50);

  setTimeout(() => {
    barContainer.removeChild(floatEl);
  }, 1200);
}

// Cambiar puntaje manual
function changeScore(team, value) {
  scores[team] += value;
  if (scores[team] < 0) scores[team] = 0;
  updateBars();
  updateLeader();
  showFloating(team, value);
}

// Inicializar
updateBars();
updateLeader();

// --------------------------
// Control con teclado
// --------------------------
document.addEventListener("keydown", function(event) {
    switch(event.key.toLowerCase()) {
        case "q": changeScore("Apple", 2); break;
        case "w": changeScore("Samsung", 2); break;
        case "e": changeScore("Xiaomi", 2); break;
        case "a": changeScore("Apple", 0.05); break;
        case "s": changeScore("Samsung", 0.05); break;
        case "d": changeScore("Xiaomi", 0.05); break;
        case "z": changeScore("Apple", -0.05); break;
        case "x": changeScore("Samsung", -0.05); break;
        case "c": changeScore("Xiaomi", -0.05); break;
    }
});
</script>

</body>
</html>
