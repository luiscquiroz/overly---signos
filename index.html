<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay Manual Live con Indicadores</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  width: 600px;
  padding: 10px;
  overflow: hidden;
}
.sign {
  margin: 15px 0;
  display: flex;
  align-items: center;
  position: relative;
}
.label {
  font-size: 16px;
  margin-right: 10px;
  width: 120px;
  font-weight: bold;
}
.bar-container {
  flex: 1;
  background: #222;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  height: 28px;
}
.fill {
  height: 100%;
  width: 0px;
  background: linear-gradient(90deg, #ff00cc, #00ffee);
  transition: width 0.3s;
}
.controls {
  margin-left: 10px;
}
button {
  margin: 2px;
  padding: 4px 6px;
  font-size: 12px;
  cursor: pointer;
}
.leader {
  font-size: 18px;
  margin-bottom: 10px;
}
/* Indicador flotante */
.floating {
  position: absolute;
  font-size: 14px;
  font-weight: bold;
  pointer-events: none;
  opacity: 1;
  transition: transform 1s ease-out, opacity 1s ease-out;
  color: #ff0;
}
</style>
</head>
<body>

<div class="leader" id="leader">MEJOR-PUNTUACIÓN: ---</div>
<div id="bars"></div>

<script>
const teams = ["SAMSUNG", "XIAOMI", "APPLE"];
let scores = {};
const container = document.getElementById("bars");
const leaderEl = document.getElementById("leader");

// Crear barras y controles
teams.forEach(team => {
  scores[team] = 8; // valor inicial
  const div = document.createElement("div");
  div.className = "sign";
  div.innerHTML = `
    <div class="label">${team}</div>
    <div class="bar-container">
      <div class="fill" id="bar-${team}"></div>
    </div>
    <div class="controls">
      <button onclick="changeScore('${team}', 2)">+2</button>
      <button onclick="changeScore('${team}', 0.05)">+0.05</button>
      <button onclick="changeScore('${team}', -0.05)">-0.05</button>
    </div>
  `;
  container.appendChild(div);
});

// Actualizar barra
function updateBars() {
  for (let team in scores) {
    const width = Math.max(0, scores[team]);
    document.getElementById(`bar-${team}`).style.width = width + "px";
  }
}

// Actualizar líder
function updateLeader() {
  let max = -1, leader = "---";
  for (let t in scores) {
    if (scores[t] > max) {
      max = scores[t];
      leader = t;
    }
  }
  leaderEl.textContent = "LÍDER: " + leader;
}

// Crear indicador flotante
function showFloating(team, value) {
  const barContainer = document.querySelector(`#bar-${team}`).parentElement;
  const floatEl = document.createElement("div");
  floatEl.className = "floating";
  floatEl.textContent = (value > 0 ? "+" : "") + value;
  barContainer.appendChild(floatEl);

  // Animación hacia arriba y fade out
  setTimeout(() => {
    floatEl.style.transform = "translateY(-30px)";
    floatEl.style.opacity = "0";
  }, 50);

  // Eliminar después de 1.2s
  setTimeout(() => {
    barContainer.removeChild(floatEl);
  }, 1200);
}

// Cambiar puntaje manual
function changeScore(team, value) {
  scores[team] += value;
  if (scores[team] < 0) scores[team] = 0;
  updateBars();
  updateLeader();
  showFloating(team, value);
}

// Inicializar
updateBars();
updateLeader();
</script>

</body>
</html>
