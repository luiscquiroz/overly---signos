<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay Live Marcas</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  width: 650px;
  padding: 10px;
  overflow: hidden;
}
.sign {
  margin: 15px 0;
  display: flex;
  align-items: center;
  position: relative;
}
.label {
  font-size: 16px;
  margin-right: 10px;
  width: 120px;
  font-weight: bold;
}
.bar-container {
  flex: 1;
  background: #222;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  height: 28px;
}
.fill {
  height: 100%;
  width: 0px;
  background: linear-gradient(90deg, #ff00cc, #00ffee);
  transition: width 0.3s;
}
.controls {
  margin-left: 10px;
}
button {
  margin: 2px;
  padding: 4px 6px;
  font-size: 12px;
  cursor: pointer;
}
.leader {
  font-size: 18px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
}
#leader-logo {
  height: 24px;
  margin-left: 8px;
  vertical-align: middle;
}
.floating {
  position: absolute;
  font-size: 14px;
  font-weight: bold;
  pointer-events: none;
  opacity: 1;
  transition: transform 1s ease-out, opacity 1s ease-out;
  color: #ffff00; 
  left: 50%;
}
.rules {
  margin-top: 20px;
  border: 1px solid #555;
  padding: 10px;
  background: #222;
  border-radius: 10px;
}
.rules h3 {
  margin: 0 0 5px 0;
  font-size: 16px;
  text-align: center;
  color: #ffcc00;
}
.rules ul {
  padding-left: 20px;
}
.rules li {
  margin: 4px 0;
  font-size: 14px;
}
</style>
</head>
<body>

<div class="leader" id="leader">
  <span id="leader-name"></span>
  <img id="leader-logo" src="" alt="">
</div>

<div id="bars"></div>

<div class="rules">
  <h3>Cómo jugar</h3>
  <ul>
    <li>💬 Comentario normal = +0.05 puntos</li>
    <li>🌸 Rosa = +2 puntos</li>
    <li>🎩 Sombrero = +6 puntos</li>
    <li>🌌 Galaxia = llena toda la barra</li>
    <li>🔫 Pistola = -2 puntos</li>
    <li>💰 Dona / Tap Tap = -0.05 puntos</li>
  </ul>
</div>

<script>
// Equipos / marcas
const teams = ["Apple", "Samsung", "Xiaomi"];
let scores = {};
const container = document.getElementById("bars");
const leaderEl = document.getElementById("leader-name");
const leaderLogo = document.getElementById("leader-logo");

// Logos por marca (cambia URL por tus imágenes)
const logos = {
  "Apple": "https://i.imgur.com/appleLogo.png",
  "Samsung": "https://i.imgur.com/samsungLogo.png",
  "Xiaomi": "https://i.imgur.com/xiaomiLogo.png"
};

// Crear barras y controles
teams.forEach(team => {
  scores[team] = 50;
  const div = document.createElement("div");
  div.className = "sign";
  div.innerHTML = `
    <div class="label">${team}</div>
    <div class="bar-container">
      <div class="fill" id="bar-${team}"></div>
    </div>
    <div class="controls">
      <button onclick="handleAction('${team}','💬')">Comentar</button>
      <button onclick="handleAction('${team}','🌸')">Rosa</button>
      <button onclick="handleAction('${team}','🎩')">Sombrero</button>
      <button onclick="handleAction('${team}','🌌')">Galaxia</button>
      <button onclick="handleAction('${team}','🔫')">Pistola</button>
      <button onclick="handleAction('${team}','💰')">Dona</button>
    </div>
  `;
  container.appendChild(div);
});

// Actualizar barras
function updateBars() {
  for (let team in scores) {
    const width = Math.max(0, Math.min(100, scores[team]));
    document.getElementById(`bar-${team}`).style.width = width + "%";
  }
}

// Mostrar líder
function updateLeader() {
  let max = -1, leader = "---";
  for (let t in scores) {
    if (scores[t] > max) {
      max = scores[t];
      leader = t;
    }
  }
  leaderEl.textContent = `⚡ ${leader} lidera ⚡ ¡comenta o dona para apoyarlo!`;
  leaderLogo.src = logos[leader] || "";
}

// Indicador flotante
function showFloating(team, value) {
  const barContainer = document.querySelector(`#bar-${team}`).parentElement;
  const floatEl = document.createElement("div");
  floatEl.className = "floating";
  floatEl.textContent = (value > 0 ? "+" : "") + value;
  barContainer.appendChild(floatEl);

  setTimeout(() => {
    floatEl.style.transform = "translateX(-50%) translateY(-30px)";
    floatEl.style.opacity = "0";
  }, 50);

  setTimeout(() => {
    barContainer.removeChild(floatEl);
  }, 1200);
}

// Función para manejar acciones / comentarios / regalos
function handleAction(team, action) {
  switch(action) {
    case "💬": // Comentario normal
      changeScore(team, 0.05);
      break;
    case "🌸": 
      changeScore(team, 2);
      break;
    case "🎩": 
      changeScore(team, 6);
      break;
    case "🌌": 
      scores[team] = 100;
      updateBars();
      showFloating(team,"MAX");
      updateLeader();
      break;
    case "🔫": 
      changeScore(team, -2);
      break;
    case "💰": 
      changeScore(team, -0.05);
      break;
  }
}

// Cambiar puntaje
function changeScore(team, value) {
  scores[team] += value;
  if (scores[team] < 0) scores[team] = 0;
  if (scores[team] > 100) scores[team] = 100;
  updateBars();
  updateLeader();
  showFloating(team,value);
}

// Inicializar
updateBars();
updateLeader();
</script>
</body>
</html>
