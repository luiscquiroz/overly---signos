<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Overlay Manual Live</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  width: 600px;
  padding: 10px;
  overflow: hidden;
}
.sign {
  margin: 15px 0;
  display: flex;
  align-items: center;
  position: relative;
}
.label {
  font-size: 16px;
  margin-right: 10px;
  width: 120px;
  font-weight: bold;
}
.bar-container {
  flex: 1;
  background: #222;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  height: 28px;
}
.fill {
  height: 100%;
  width: 0px;
  background: linear-gradient(90deg, #ff00cc, #00ffee);
  transition: width 0.3s;
}
.controls {
  margin-left: 10px;
}
button {
  margin: 2px;
  padding: 4px 6px;
  font-size: 12px;
  cursor: pointer;
}
.leader {
  font-size: 18px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="leader" id="leader">LÍDER: ---</div>
<div id="bars"></div>

<script>
// Configuración de signos / equipos
const teams = ["LEO", "TAURO", "GEMINIS"];
let scores = {};
const container = document.getElementById("bars");
const leaderEl = document.getElementById("leader");

// Crear barras y controles
teams.forEach(team => {
  scores[team] = 50; // valor inicial
  const div = document.createElement("div");
  div.className = "sign";
  div.innerHTML = `
    <div class="label">${team}</div>
    <div class="bar-container">
      <div class="fill" id="bar-${team}"></div>
    </div>
    <div class="controls">
      <button onclick="changeScore('${team}', 10)">+10</button>
      <button onclick="changeScore('${team}', 5)">+5</button>
      <button onclick="changeScore('${team}', -5)">-5</button>
    </div>
  `;
  container.appendChild(div);
});

// Función para actualizar barra
function updateBars() {
  for (let team in scores) {
    const width = Math.max(0, scores[team]); // evitar negativos
    document.getElementById(`bar-${team}`).style.width = width + "px";
  }
}

// Función para cambiar puntaje manual
function changeScore(team, value) {
  scores[team] += value;
  if (scores[team] < 0) scores[team] = 0;
  updateBars();
  updateLeader();
}

// Función para actualizar líder
function updateLeader() {
  let max = -1, leader = "---";
  for (let t in scores) {
    if (scores[t] > max) {
      max = scores[t];
      leader = t;
    }
  }
  leaderEl.textContent = "LÍDER: " + leader;
}

// Inicializar barras
updateBars();
updateLeader();
</script>

</body>
</html>
